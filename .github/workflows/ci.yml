name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check-web:
    name: Web - Typecheck, Lint, Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: web

      - name: Typecheck
        run: npx tsc --noEmit
        working-directory: web

      - name: Lint
        run: npm run lint
        working-directory: web

      - name: Build
        run: npx vite build
        working-directory: web

  check-python:
    name: Python - Syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check syntax
        run: python -m py_compile coin_flip.py
